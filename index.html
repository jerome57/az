<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="亞利桑那州春季自駕遊指南，以 Peoria 為中心，涵蓋羚羊峽谷、塞多納、馬蹄灣等精選景點與行程規劃。" />
  <meta property="og:title" content="AZ 2026 Trip" />
  <meta property="og:description" content="以 Peoria 為基地的完整旅遊地圖，含頂級餐廳、精品咖啡、演唱會資訊。" />
  <meta property="og:type" content="website" />
  <title>AZ 2026 Trip · Peoria 出發</title>

  <!-- Fonts: Noto Sans TC (body) + Noto Serif TC (display) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&family=Noto+Serif+TC:wght@600;700&display=swap" rel="stylesheet" />

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

  <style>
    /* ── Design Tokens ───────────────────────────────── */
    :root {
      --sand:      #f5ede0;
      --sand-dark: #e8d5bc;
      --clay:      #b85c2a;
      --sky:       #4a9dc4;
      --dusk:      #2c2420;
      --dust:      #8c7060;
      --white:     #fdfaf7;

      --radius-card:       14px;
      --shadow-card:       0 2px 12px rgba(44,36,32,.10);
      --shadow-card-hover: 0 6px 24px rgba(44,36,32,.18);
      --transition:        .2s ease;

      --font-body:    'Noto Sans TC', 'PingFang TC', 'Microsoft JhengHei', sans-serif;
      --font-display: 'Noto Serif TC', 'Georgia', serif;

      --text-xs:   .70rem;
      --text-sm:   .80rem;
      --text-base: .88rem;
      --text-lg:   1.00rem;
      --text-2xl:  1.40rem;
      --lh-tight:  1.30;
      --lh-loose:  1.70;
      --ls-tight:  -.02em;
      --ls-wide:   .04em;
    }

    /* ── Reset ───────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; }
    body {
      font-family: var(--font-body);
      background: var(--sand);
      color: var(--dusk);
      display: flex;
      flex-direction: column;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      text-rendering: optimizeLegibility;
      font-feature-settings: "kern" 1, "liga" 1;
    }

    /* ── Header ──────────────────────────────────────── */
    header {
      background: var(--dusk);
      color: var(--sand);
      padding: 14px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-shrink: 0;
      z-index: 100;
      border-bottom: 3px solid var(--clay);
    }
    .header-title h1 {
      font-family: var(--font-display);
      font-size: var(--text-2xl);
      font-weight: 700;
      letter-spacing: var(--ls-tight);
      line-height: var(--lh-tight);
      color: var(--white);
    }
    .header-title h1 span { color: var(--clay); }
    .header-badge {
      background: var(--clay);
      color: var(--white);
      font-size: var(--text-xs);
      font-weight: 500;
      letter-spacing: .03em;
      padding: 5px 13px;
      border-radius: 999px;
      white-space: nowrap;
      display: flex;
      align-items: center;
      gap: 5px;
      flex-shrink: 0;
    }

    /* ── Layout ──────────────────────────────────────── */
    main { flex: 1; display: flex; overflow: hidden; min-height: 0; }

    /* ── Sidebar ─────────────────────────────────────── */
    #sidebar {
      width: 380px;
      min-width: 300px;
      max-width: 420px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      background: var(--white);
      border-right: 1px solid var(--sand-dark);
      overflow: hidden;
      z-index: 50;
      position: relative;
      transition: width .35s cubic-bezier(.4,0,.2,1),
                  min-width .35s cubic-bezier(.4,0,.2,1),
                  box-shadow .35s ease;
    }
    #sidebar.collapsed {
      width: 54px;
      min-width: 54px;
      box-shadow: 2px 0 12px rgba(44,36,32,.12);
    }
    #sidebar.collapsed #filter-bar,
    #sidebar.collapsed #location-list { opacity: 0; pointer-events: none; }

    /* ── Toggle Button ───────────────────────────────── */
    #sidebar-toggle {
      position: absolute;
      top: 50%;
      right: -16px;
      transform: translateY(-50%);
      z-index: 200;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      border: 1.5px solid var(--sand-dark);
      background: var(--white);
      color: var(--clay);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      box-shadow: 0 2px 8px rgba(44,36,32,.18);
      font-size: 13px;
      transition: background .2s, color .2s, transform .35s cubic-bezier(.4,0,.2,1);
    }
    #sidebar-toggle:hover { background: var(--clay); color: var(--white); }
    #sidebar.collapsed #sidebar-toggle { transform: translateY(-50%) rotate(180deg); }

    /* ── Mini Icon Strip (collapsed only) ───────────── */
    #sidebar-icons {
      display: none;
      flex-direction: column;
      align-items: center;
      padding: 10px 0;
      gap: 6px;
      overflow: hidden;
    }
    #sidebar.collapsed #sidebar-icons { display: flex; }
    #sidebar.collapsed #filter-bar   { display: none; }

    .mini-icon-btn {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      border: none;
      background: var(--sand);
      color: var(--dust);
      font-size: 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      transition: background .15s, color .15s;
    }
    .mini-icon-btn:hover,
    .mini-icon-btn.active { background: var(--clay); color: var(--white); }
    .mini-icon-btn .mini-tooltip {
      position: absolute;
      left: calc(100% + 8px);
      top: 50%;
      transform: translateY(-50%);
      background: var(--dusk);
      color: var(--white);
      font-family: var(--font-body);
      font-size: var(--text-xs);
      white-space: nowrap;
      padding: 4px 9px;
      border-radius: 6px;
      pointer-events: none;
      opacity: 0;
      transition: opacity .15s;
    }
    .mini-icon-btn:hover .mini-tooltip { opacity: 1; }

    /* ── Filter Bar ──────────────────────────────────── */
    #filter-bar {
      padding: 12px 14px;
      border-bottom: 1px solid var(--sand-dark);
      display: flex;
      gap: 6px;
      overflow-x: auto;
      flex-shrink: 0;
      background: var(--sand);
      scrollbar-width: thin;
      scrollbar-color: var(--sand-dark) transparent;
      transition: opacity .25s ease;
    }
    #filter-bar::-webkit-scrollbar { height: 4px; }
    #filter-bar::-webkit-scrollbar-thumb { background: var(--sand-dark); border-radius: 4px; }

    .filter-btn {
      border: 1.5px solid var(--sand-dark);
      cursor: pointer;
      font-family: var(--font-body);
      font-size: var(--text-xs);
      font-weight: 500;
      letter-spacing: .01em;
      padding: 6px 13px;
      border-radius: 999px;
      white-space: nowrap;
      background: var(--white);
      color: var(--dust);
      transition: background var(--transition), color var(--transition), transform .1s;
    }
    .filter-btn:hover  { background: var(--sand-dark); transform: translateY(-1px); }
    .filter-btn.active { background: var(--clay); color: var(--white); border-color: var(--clay); }

    /* ── Location List ───────────────────────────────── */
    #location-list {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      scrollbar-width: thin;
      scrollbar-color: var(--sand-dark) transparent;
      transition: opacity .25s ease;
    }
    #location-list::-webkit-scrollbar { width: 5px; }
    #location-list::-webkit-scrollbar-thumb { background: var(--sand-dark); border-radius: 4px; }

    /* ── Card ────────────────────────────────────────── */
    .loc-card {
      background: var(--white);
      border: 1.5px solid var(--sand-dark);
      border-radius: var(--radius-card);
      padding: 13px 14px;
      cursor: pointer;
      display: flex;
      align-items: flex-start;
      gap: 12px;
      text-align: left;
      width: 100%;
      font-family: var(--font-body);
      color: var(--dusk);
      transition: box-shadow var(--transition), border-color var(--transition), transform var(--transition);
    }
    .loc-card:hover         { box-shadow: var(--shadow-card-hover); border-color: var(--clay); transform: translateY(-2px); }
    .loc-card.is-base       { background: #eef4fb; border-color: var(--sky); }
    .loc-card.is-highlight  { background: #fff8f3; border-color: var(--clay); }
    .loc-card.is-minor      { opacity: .88; }
    .loc-card.is-minor:hover { opacity: 1; }

    .card-icon {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      font-size: 15px;
      color: #fff;
      margin-top: 2px;
      box-shadow: 0 2px 6px rgba(0,0,0,.18);
    }
    .loc-card.is-minor .card-icon {
      width: 30px;
      height: 30px;
      font-size: 12px;
      margin-top: 6px;
      opacity: .85;
    }

    .card-body { flex: 1; min-width: 0; }
    .card-name {
      font-weight: 700;
      font-size: var(--text-base);
      line-height: var(--lh-tight);
      letter-spacing: var(--ls-tight);
      margin-bottom: 4px;
    }
    .loc-card.is-minor .card-name { font-weight: 500; color: var(--dust); }

    .card-distance {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: var(--text-xs);
      font-weight: 500;
      letter-spacing: .01em;
      padding: 2px 8px;
      border-radius: 999px;
      background: var(--sand);
      color: var(--dust);
      margin-bottom: 5px;
    }
    .card-desc {
      font-size: var(--text-sm);
      font-weight: 300;
      color: var(--dust);
      line-height: var(--lh-loose);
    }
    .card-tag {
      display: inline-block;
      font-size: var(--text-xs);
      font-weight: 700;
      letter-spacing: var(--ls-wide);
      padding: 2px 7px;
      border-radius: 4px;
      background: #ffecd8;
      color: var(--clay);
      margin-bottom: 4px;
    }
    .card-tag.tag-minor {
      background: var(--sand-dark);
      color: var(--dust);
      font-weight: 500;
    }

    /* ── Map ─────────────────────────────────────────── */
    #map-wrap { flex: 1; position: relative; padding: 10px; min-width: 0; }
    #map {
      width: 100%;
      height: 100%;
      border-radius: var(--radius-card);
      box-shadow: var(--shadow-card);
      border: 1.5px solid var(--sand-dark);
    }

    /* ── Leaflet Popup ───────────────────────────────── */
    .leaflet-popup-content-wrapper {
      border-radius: 10px !important;
      box-shadow: var(--shadow-card-hover) !important;
      font-family: var(--font-body) !important;
      -webkit-font-smoothing: antialiased;
      border: 1.5px solid var(--sand-dark);
    }
    .leaflet-popup-content { margin: 14px 16px !important; }
    .popup-title {
      font-family: var(--font-display);
      font-weight: 700;
      font-size: var(--text-lg);
      line-height: var(--lh-tight);
      letter-spacing: var(--ls-tight);
      margin-bottom: 5px;
    }
    .popup-dist {
      font-size: var(--text-xs);
      font-weight: 400;
      color: var(--dust);
      margin-bottom: 7px;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .popup-desc {
      font-size: var(--text-sm);
      font-weight: 300;
      color: #555;
      line-height: var(--lh-loose);
    }

    /* ── Map Pins ────────────────────────────────────── */
    .map-pin {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      border: 3px solid #fff;
      box-shadow: 0 2px 8px rgba(0,0,0,.28);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 14px;
      transition: transform .15s, opacity .15s;
    }
    .map-pin:hover { transform: scale(1.15); }
    .map-pin.is-minor {
      width: 24px;
      height: 24px;
      border-width: 2px;
      font-size: 11px;
      opacity: .8;
      box-shadow: 0 2px 4px rgba(0,0,0,.2);
    }
    .map-pin.is-minor:hover { opacity: 1; transform: scale(1.2); }

    /* ── Empty State ─────────────────────────────────── */
    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: var(--dust);
      font-size: var(--text-sm);
    }
    .empty-state i { font-size: 2rem; margin-bottom: 10px; opacity: .4; display: block; }

    /* ── Mobile ──────────────────────────────────────── */
    @media (max-width: 768px) {
      html, body { overflow: auto; }
      main { flex-direction: column; overflow: visible; }
      #sidebar {
        width: 100% !important;
        min-width: 0 !important;
        max-width: none;
        max-height: 50vh;
        border-right: none;
        border-bottom: 1px solid var(--sand-dark);
        transition: max-height .35s cubic-bezier(.4,0,.2,1), opacity .25s ease;
      }
      #sidebar.collapsed {
        max-height: 48px;
        width: 100% !important;
        min-width: 0 !important;
        box-shadow: none;
      }
      #sidebar.collapsed #sidebar-icons { display: none; }
      #sidebar-toggle { right: 14px; top: auto; bottom: -16px; transform: none; }
      #sidebar.collapsed #sidebar-toggle { transform: rotate(180deg); }
      #map-wrap { height: 55vw; min-height: 300px; flex: none; }
      #map { height: 100%; }
      .header-title h1 { font-size: 1.1rem; }
    }
    @media (max-width: 480px) {
      header { padding: 10px 14px; }
      .header-badge { display: none; }
    }
  </style>
</head>

<body>
  <!-- ── Header ── -->
  <header role="banner">
    <div class="header-title">
      <h1>AZ <span>2026 Trip</span></h1>
    </div>
    <span class="header-badge" aria-label="旅遊基地位於 Peoria, AZ">
      <i class="fa-solid fa-location-dot" aria-hidden="true"></i>
      Peoria, AZ
    </span>
  </header>

  <!-- ── Main ── -->
  <main role="main">
    <aside id="sidebar" aria-label="景點列表">
      <!-- Toggle -->
      <button id="sidebar-toggle" aria-label="收折側欄" title="收折 / 展開側欄">
        <i class="fa-solid fa-chevron-left" aria-hidden="true"></i>
      </button>

      <!-- Mini icon strip (collapsed only) -->
      <div id="sidebar-icons" aria-hidden="true">
        <button class="mini-icon-btn active" data-cat="all">🗺️<span class="mini-tooltip">全部顯示</span></button>
        <button class="mini-icon-btn" data-cat="attraction">🏜️<span class="mini-tooltip">壯闊風景</span></button>
        <button class="mini-icon-btn" data-cat="art">🎨<span class="mini-tooltip">藝文展覽</span></button>
        <button class="mini-icon-btn" data-cat="restaurant">🍽️<span class="mini-tooltip">頂級餐廳</span></button>
        <button class="mini-icon-btn" data-cat="coffee">☕<span class="mini-tooltip">精品咖啡</span></button>
        <button class="mini-icon-btn" data-cat="shopping">🛍️<span class="mini-tooltip">購物</span></button>
        <button class="mini-icon-btn" data-cat="events">🎟️<span class="mini-tooltip">賽事演出</span></button>
        <button class="mini-icon-btn" data-cat="hotel">🏨<span class="mini-tooltip">住宿</span></button>
      </div>

      <!-- Filter bar -->
      <nav id="filter-bar" role="navigation" aria-label="景點分類篩選">
        <button class="filter-btn active" data-cat="all"        aria-pressed="true" >🗺️ 全部</button>
        <button class="filter-btn"        data-cat="attraction" aria-pressed="false">🏜️ 壯闊風景</button>
        <button class="filter-btn"        data-cat="art"        aria-pressed="false">🎨 藝文展覽</button>
        <button class="filter-btn"        data-cat="restaurant" aria-pressed="false">🍽️ 頂級餐廳</button>
        <button class="filter-btn"        data-cat="coffee"     aria-pressed="false">☕ 精品咖啡</button>
        <button class="filter-btn"        data-cat="shopping"   aria-pressed="false">🛍️ 購物</button>
        <button class="filter-btn"        data-cat="events"     aria-pressed="false">🎟️ 賽事演出</button>
        <button class="filter-btn"        data-cat="hotel"      aria-pressed="false">🏨 住宿</button>
      </nav>

      <!-- List -->
      <ul id="location-list" role="list" aria-live="polite" aria-label="篩選後的景點"></ul>
    </aside>

    <section id="map-wrap" aria-label="互動地圖">
      <div id="map" role="application" aria-label="亞利桑那州旅遊地圖"></div>
    </section>
  </main>

  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

  <script>
    'use strict';

    /* ── Data ────────────────────────────────────────── */
    const LOCATIONS = [
      // Accommodation
      { id:'peoria', name:'Peoria（您的住宿基地）', category:'hotel',
        lat:33.5806, lng:-112.2374, timeFromBase:'起點', icon:'fa-house', isBase:true,
        desc:'這次旅程的溫馨基地，位於鳳凰城北側，前往北部峽谷、Sedona 及市區看球都非常便利。' },
      { id:'courtyard-page', name:'Courtyard by Marriott Page at Lake Powell', category:'hotel',
        lat:36.9255, lng:-111.4725, timeFromBase:'車程約 4 小時（Page 市）', icon:'fa-bed',
        desc:'前往羚羊峽谷與馬蹄灣的最佳連鎖飯店。設施完善、有戶外泳池，可累積 Bonvoy 積分。' },

      // Attractions
      { id:'antelope-canyon-x', name:'羚羊 X 峽谷（Antelope Canyon X）', category:'attraction',
        lat:36.8402, lng:-111.3713, timeFromBase:'車程約 4 小時（Page 市）', icon:'fa-camera', highlight:true,
        desc:'⭐ 本次重要亮點：人潮較少的隱藏版狹縫型峽谷秘境，可悠閒拍照。⚠️ 必須提前線上預約導覽。' },
      { id:'horseshoe-bend', name:'馬蹄灣（Horseshoe Bend）', category:'attraction',
        lat:36.8791, lng:-111.5103, timeFromBase:'車程約 4 小時（Page 市）', icon:'fa-water',
        desc:'距羚羊峽谷極近，科羅拉多河切割出 270° 壯麗懸崖大迴轉，傍晚日落時分尤為壯觀。' },
      { id:'monument-valley', name:'紀念碑谷（Monument Valley）', category:'attraction',
        lat:36.9989, lng:-110.0984, timeFromBase:'從 Page 出發約 2 小時', icon:'fa-monument',
        desc:'位於 AZ／UT 州界，壯觀的紅色孤峰群，美國西部牛仔電影與《阿甘正傳》的經典場景。' },
      { id:'sedona', name:'塞多納（Sedona）', category:'attraction',
        lat:34.8697, lng:-111.7610, timeFromBase:'車程約 1 小時 45 分', icon:'fa-mountain-sun',
        desc:'世界級紅岩景觀與靈性能量聖地。推薦 Bell Rock 或 Cathedral Rock 健行步道。' },
      { id:'jerome', name:'傑羅姆（Jerome）', category:'attraction',
        lat:34.7489, lng:-112.1137, timeFromBase:'車程約 1 小時 30 分', icon:'fa-road',
        desc:'89A 公路沿線的懸崖藝術小鎮，擁有絕佳視野，隨意漫步皆是風景。' },
      { id:'lake-pleasant', name:'歡樂湖區域公園（Lake Pleasant）', category:'attraction',
        lat:33.8447, lng:-112.2742, timeFromBase:'車程約 30 分鐘（備選）', icon:'fa-water',
        desc:'Peoria 在地秘境，被高聳仙人掌環繞的沙漠湖泊，適合半日遊。' },
      { id:'cave-creek', name:'穴溪（Cave Creek）', category:'attraction',
        lat:33.8334, lng:-111.9507, timeFromBase:'車程約 35 分鐘（備選）', icon:'fa-hat-cowboy',

      { id:'superstition-mountains', name:'迷信山脈與 Goldfield 鬼鎮', category:'attraction',
        lat:33.4542, lng:-111.4795, timeFromBase:'車程約 1 小時（備選）', icon:'fa-ghost',
        desc:'絕美鋸齒狀沙漠群山，搭配真實西部淘金小鎮，氣氛神秘有趣。' },

        desc:'Phish 樂團演唱會（4/18、4/23–25）或《綠野仙蹤》沉浸式電影體驗。' },
      { id:'david-byrne', name:'David Byrne 演唱會', category:'events',
        lat:36.1170, lng:-115.1760, timeFromBase:'跨州行程（拉斯維加斯）', icon:'fa-music',
        desc:'4/20 凱薩宮 Colosseum，前衛搖滾傳奇的一夜獨場，千萬不要錯過。' }
    ];

    /* ── Category Colors ─────────────────────────────── */
    const CAT_COLOR = {
      attraction: '#b85c2a',
      art:        '#4a9dc4',
      restaurant: '#d4a019',
      coffee:     '#7a6040',
      shopping:   '#9b6bb5',
      events:     '#c0392b',
      hotel:      '#4a7fb5'
    };

    /* ── State ───────────────────────────────────────── */
    let currentCat = 'all';
    let leafletMap  = null;
    const markersMap = {};

    /* ── Map ─────────────────────────────────────────── */
    function initMap() {
      leafletMap = L.map('map', { zoomControl: true }).setView([34.5, -111.5], 7);
      L.tileLayer('https://mt1.google.com/vt/lyrs=m&hl=zh-TW&x={x}&y={y}&z={z}', {
        attribution: '&copy; <a href="https://maps.google.com" target="_blank" rel="noopener">Google Maps</a>',
        maxZoom: 20
      }).addTo(leafletMap);
      LOCATIONS.forEach(addMarker);
      fitAllVisible();
    }

    function makeIcon(color, iconClass, isMinor) {
      const cls  = isMinor ? 'map-pin is-minor' : 'map-pin';
      const size = isMinor ? 24 : 34;
      const anc  = size / 2;
      return L.divIcon({
        className: '',
        html: `<div class="${cls}" style="background:${color}" aria-hidden="true">
                 <i class="fa-solid ${iconClass}"></i></div>`,
        iconSize: [size, size], iconAnchor: [anc, anc], popupAnchor: [0, -anc]
      });
    }

    function addMarker(loc) {
      const color  = CAT_COLOR[loc.category] || '#666';
      const marker = L.marker([loc.lat, loc.lng], {
        icon: makeIcon(color, loc.icon, loc.isMinor), title: loc.name, alt: loc.name
      }).addTo(leafletMap);
      marker.bindPopup(`
        <div class="popup-title" style="color:${color}">${escHtml(loc.name)}</div>
        <div class="popup-dist"><i class="fa-solid fa-car" aria-hidden="true"></i> ${escHtml(loc.timeFromBase)}</div>
        <div class="popup-desc">${escHtml(loc.desc)}</div>
      `, { maxWidth: 260 });
      marker.on('click', () => scrollCardIntoView(loc.id));
      markersMap[loc.id] = marker;
    }

    /* ── List ────────────────────────────────────────── */
    function renderList() {
      const list = document.getElementById('location-list');
      const frag = document.createDocumentFragment();
      const filtered = LOCATIONS.filter(loc =>
        currentCat === 'all' || loc.category === currentCat || loc.category === 'hotel'
      );

      if (!filtered.length) {
        const li = document.createElement('li');
        li.className = 'empty-state';
        li.innerHTML = '<i class="fa-solid fa-binoculars"></i>此分類目前沒有地點';
        frag.appendChild(li);
      } else {
        filtered.forEach(loc => {
          const color = CAT_COLOR[loc.category] || '#666';
          const li    = document.createElement('li');
          li.setAttribute('role', 'listitem');

          const btn = document.createElement('button');
          btn.className = ['loc-card',
            loc.isBase    ? 'is-base'      : '',
            loc.highlight ? 'is-highlight' : '',
            loc.isMinor   ? 'is-minor'     : ''
          ].filter(Boolean).join(' ');
          btn.id = `card-${loc.id}`;
          btn.setAttribute('aria-label', `前往地圖查看：${loc.name}`);
          btn.onclick = () => focusLocation(loc.id);

          const tagHtml = loc.highlight
            ? '<span class="card-tag">⭐ 本次亮點</span>'
            : loc.isMinor
              ? '<span class="card-tag tag-minor"><i class="fa-solid fa-circle-pause"></i> 順路中繼點</span>'
              : '';

          btn.innerHTML = `
            <div class="card-icon" style="background:${color}" aria-hidden="true">
              <i class="fa-solid ${loc.icon}"></i>
            </div>
            <div class="card-body">
              ${tagHtml}
              <div class="card-name">${escHtml(loc.name)}</div>
              <div class="card-distance">
                <i class="fa-solid ${loc.isBase ? 'fa-location-dot' : 'fa-car'}" aria-hidden="true"></i>
                ${escHtml(loc.timeFromBase)}
              </div>
              <p class="card-desc">${escHtml(loc.desc)}</p>
            </div>`;
          li.appendChild(btn);
          frag.appendChild(li);
        });
      }
      list.innerHTML = '';
      list.appendChild(frag);
    }

    /* ── Filter ──────────────────────────────────────── */
    function applyFilter(cat) {
      currentCat = cat;

      // Sync both filter-bar buttons and mini-icon-btn in one pass
      document.querySelectorAll('[data-cat]').forEach(btn => {
        if (btn.id === 'sidebar-toggle') return; // skip toggle
        const active = btn.dataset.cat === cat;
        btn.classList.toggle('active', active);
        if (btn.classList.contains('filter-btn')) {
          btn.setAttribute('aria-pressed', active ? 'true' : 'false');
        }
      });

      LOCATIONS.forEach(loc => {
        const visible = cat === 'all' || loc.category === cat || loc.category === 'hotel';
        const marker  = markersMap[loc.id];
        if (!marker) return;
        if ( visible && !leafletMap.hasLayer(marker)) leafletMap.addLayer(marker);
        if (!visible &&  leafletMap.hasLayer(marker)) leafletMap.removeLayer(marker);
      });

      renderList();
      fitAllVisible();
    }

    /* ── Navigation ──────────────────────────────────── */
    function focusLocation(id) {
      const loc = LOCATIONS.find(l => l.id === id);
      if (!loc) return;

      const zoom = loc.isBase ? 12
                 : ['antelope-canyon-x', 'monument-valley'].includes(id) ? 11
                 : 13;

      // Auto-collapse sidebar
      const sidebar   = document.getElementById('sidebar');
      const toggleBtn = document.getElementById('sidebar-toggle');
      if (!sidebar.classList.contains('collapsed')) {
        sidebar.classList.add('collapsed');
        toggleBtn.setAttribute('aria-label', '展開側欄');
        setTimeout(() => leafletMap?.invalidateSize(), 360);
      }

      leafletMap.flyTo([loc.lat, loc.lng], zoom, { duration: 1.2 });
      setTimeout(() => markersMap[id]?.openPopup(), 1250);
      scrollCardIntoView(id);
    }

    function fitAllVisible() {
      const coords = LOCATIONS
        .filter(loc => currentCat === 'all' || loc.category === currentCat || loc.category === 'hotel')
        .map(loc => [loc.lat, loc.lng]);
      if (coords.length) leafletMap.fitBounds(coords, { padding: [40, 40], maxZoom: 12 });
    }

    function scrollCardIntoView(id) {
      document.getElementById(`card-${id}`)?.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    /* ── Utility ─────────────────────────────────────── */
    function escHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;').replace(/</g, '&lt;')
        .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    /* ── Boot ────────────────────────────────────────── */
    document.addEventListener('DOMContentLoaded', () => {
      // Delegated listener: filter-bar + mini icon strip
      document.getElementById('filter-bar').addEventListener('click', e => {
        const btn = e.target.closest('.filter-btn');
        if (btn) applyFilter(btn.dataset.cat);
      });
      document.getElementById('sidebar-icons').addEventListener('click', e => {
        const btn = e.target.closest('.mini-icon-btn');
        if (btn) applyFilter(btn.dataset.cat);
      });

      // Sidebar toggle
      const sidebar   = document.getElementById('sidebar');
      const toggleBtn = document.getElementById('sidebar-toggle');
      toggleBtn.addEventListener('click', () => {
        const collapsed = sidebar.classList.toggle('collapsed');
        toggleBtn.setAttribute('aria-label', collapsed ? '展開側欄' : '收折側欄');
        setTimeout(() => leafletMap?.invalidateSize(), 360);
      });

      initMap();
      renderList();
      setTimeout(() => leafletMap?.invalidateSize(), 300);
    });

    window.addEventListener('resize', () => leafletMap?.invalidateSize());
  </script>
