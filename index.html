<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="亞利桑那州春季自駕遊指南，以 Peoria 為中心，涵蓋羚羊峽谷、塞多納、馬蹄灣等精選景點與行程規劃。" />
  <meta property="og:title" content="AZ 2026 Trip" />
  <meta property="og:description" content="以 Peoria 為基地的完整旅遊地圖，含頂級餐廳、精品咖啡、演唱會資訊。" />
  <meta property="og:type" content="website" />
  <title>AZ 2026 Trip · Peoria 出發</title>

  <!-- Fonts: font-display=swap 避免 FOUT (#12) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&family=Noto+Serif+TC:wght@600;700&display=swap&font-display=swap" rel="stylesheet" />

  <!-- Leaflet + MarkerCluster (#1) -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

  <style>
    /* ── Design Tokens ───────────────────────────────── */
    :root {
      --sand:      #f5ede0;
      --sand-dark: #e8d5bc;
      --clay:      #b85c2a;
      --sky:       #4a9dc4;
      --dusk:      #2c2420;
      --dust:      #8c7060;
      --white:     #fdfaf7;

      --radius-card:       14px;
      --shadow-card:       0 2px 12px rgba(44,36,32,.10);
      --shadow-card-hover: 0 6px 24px rgba(44,36,32,.18);
      --transition:        .2s ease;

      --font-body:    'Noto Sans TC', 'PingFang TC', 'Microsoft JhengHei', sans-serif;
      --font-display: 'Noto Serif TC', 'Georgia', serif;

      --text-xs:   .70rem;
      --text-sm:   .80rem;
      --text-base: .88rem;
      --text-lg:   1.00rem;
      --text-2xl:  1.40rem;
      --lh-tight:  1.30;
      --lh-loose:  1.70;
      --ls-tight:  -.02em;
      --ls-wide:   .04em;
    }

    /* ── Reset ───────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; }
    body {
      font-family: var(--font-body);
      background: var(--sand);
      color: var(--dusk);
      display: flex;
      flex-direction: column;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      text-rendering: optimizeLegibility;
      font-feature-settings: "kern" 1, "liga" 1;
    }

    /* ── Header ──────────────────────────────────────── */
    header {
      background: var(--dusk);
      color: var(--sand);
      padding: 14px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-shrink: 0;
      z-index: 100;
      border-bottom: 3px solid var(--clay);
    }
    .header-title h1 {
      font-family: var(--font-display);
      font-size: var(--text-2xl);
      font-weight: 700;
      letter-spacing: var(--ls-tight);
      line-height: var(--lh-tight);
      color: var(--white);
    }
    .header-title h1 span { color: var(--clay); }
    .header-update {
      font-size: var(--text-xs);
      font-weight: 300;
      color: var(--dust);
      letter-spacing: .01em;
      margin-top: 3px;
    }
    .header-update time { font-weight: 500; color: #a88070; }
    .header-right {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }
    .header-badge {
      background: var(--clay);
      color: var(--white);
      font-size: var(--text-xs);
      font-weight: 500;
      letter-spacing: .03em;
      padding: 5px 13px;
      border-radius: 999px;
      white-space: nowrap;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    /* ── Header icon buttons (locate + fit) ─────────── */
    .header-icon-btn {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      border: 1.5px solid rgba(255,255,255,.2);
      background: rgba(255,255,255,.08);
      color: var(--sand);
      font-size: 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background .2s, color .2s, border-color .2s;
      flex-shrink: 0;
    }
    .header-icon-btn:hover { background: var(--clay); border-color: var(--clay); color: #fff; }
    #locate-btn.locating  { animation: pulse-ring .9s ease infinite; }
    #locate-btn.located   { background: #2a7a4a; border-color: #2a7a4a; color: #fff; }
    #locate-btn.error     { background: #8b2020; border-color: #8b2020; color: #fff; }
    @keyframes pulse-ring {
      0%   { box-shadow: 0 0 0 0   rgba(184,92,42,.6); }
      70%  { box-shadow: 0 0 0 8px rgba(184,92,42,0);  }
      100% { box-shadow: 0 0 0 0   rgba(184,92,42,0);  }
    }

    /* ── Layout ──────────────────────────────────────── */
    main { flex: 1; display: flex; overflow: hidden; min-height: 0; }

    /* ── Sidebar ─────────────────────────────────────── */
    /* #10 — subtle top gradient strip matching header */
    #sidebar {
      width: 380px;
      min-width: 300px;
      max-width: 420px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      background: var(--white);
      border-right: 1px solid var(--sand-dark);
      overflow: hidden;
      z-index: 50;
      position: relative;
      transition: width .35s cubic-bezier(.4,0,.2,1),
                  min-width .35s cubic-bezier(.4,0,.2,1),
                  box-shadow .35s ease;
    }
    #sidebar::before {
      content: '';
      display: block;
      height: 3px;
      background: linear-gradient(90deg, var(--clay) 0%, transparent 100%);
      flex-shrink: 0;
    }
    #sidebar.collapsed {
      width: 54px;
      min-width: 54px;
      box-shadow: 2px 0 12px rgba(44,36,32,.12);
    }
    #sidebar.collapsed #filter-bar,
    #sidebar.collapsed #location-list { opacity: 0; pointer-events: none; }

    /* ── Toggle Button ───────────────────────────────── */
    #sidebar-toggle {
      position: absolute;
      top: 50%;
      right: -16px;
      transform: translateY(-50%);
      z-index: 200;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      border: 1.5px solid var(--sand-dark);
      background: var(--white);
      color: var(--clay);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      box-shadow: 0 2px 8px rgba(44,36,32,.18);
      font-size: 13px;
      transition: background .2s, color .2s, transform .35s cubic-bezier(.4,0,.2,1);
    }
    #sidebar-toggle:hover { background: var(--clay); color: var(--white); }
    #sidebar.collapsed #sidebar-toggle { transform: translateY(-50%) rotate(180deg); }

    /* ── Mini Icon Strip (collapsed) ─────────────────── */
    #sidebar-icons {
      display: none;
      flex-direction: column;
      align-items: center;
      padding: 10px 0;
      gap: 6px;
      overflow: hidden;
    }
    #sidebar.collapsed #sidebar-icons { display: flex; }
    #sidebar.collapsed #filter-bar   { display: none; }

    .mini-icon-btn {
      width: 36px; height: 36px;
      border-radius: 10px; border: none;
      background: var(--sand); color: var(--dust);
      font-size: 14px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      position: relative;
      transition: background .15s, color .15s;
    }
    .mini-icon-btn:hover,
    .mini-icon-btn.active { background: var(--clay); color: var(--white); }
    .mini-icon-btn .mini-tooltip {
      position: absolute;
      left: calc(100% + 8px); top: 50%;
      transform: translateY(-50%);
      background: var(--dusk); color: var(--white);
      font-family: var(--font-body); font-size: var(--text-xs);
      white-space: nowrap; padding: 4px 9px; border-radius: 6px;
      pointer-events: none; opacity: 0; transition: opacity .15s;
      z-index: 300;
    }
    .mini-icon-btn:hover .mini-tooltip { opacity: 1; }

    /* ── Filter Bar ──────────────────────────────────── */
    #filter-bar {
      padding: 10px 12px;
      border-bottom: 1px solid var(--sand-dark);
      display: flex; gap: 5px;
      overflow-x: auto; flex-shrink: 0;
      background: var(--sand);
      scrollbar-width: thin;
      scrollbar-color: var(--sand-dark) transparent;
      transition: opacity .25s ease;
      align-items: center;
    }
    #filter-bar::-webkit-scrollbar { height: 4px; }
    #filter-bar::-webkit-scrollbar-thumb { background: var(--sand-dark); border-radius: 4px; }

    .filter-btn {
      border: 1.5px solid var(--sand-dark);
      cursor: pointer;
      font-family: var(--font-body);
      font-size: var(--text-xs); font-weight: 500;
      letter-spacing: .01em;
      padding: 5px 11px; border-radius: 999px;
      white-space: nowrap;
      background: var(--white); color: var(--dust);
      transition: background var(--transition), color var(--transition), transform .1s;
      display: flex; align-items: center; gap: 4px;
      position: relative;
    }
    .filter-btn:hover  { background: var(--sand-dark); transform: translateY(-1px); }
    .filter-btn.active { background: var(--clay); color: var(--white); border-color: var(--clay); }

    /* #2 — filter badge count */
    .filter-badge {
      background: rgba(255,255,255,.3);
      color: inherit;
      font-size: .60rem; font-weight: 700;
      padding: 1px 5px; border-radius: 999px;
      line-height: 1.4;
      min-width: 16px; text-align: center;
    }
    .filter-btn:not(.active) .filter-badge {
      background: var(--sand-dark);
      color: var(--dust);
    }

    /* ── Location List ───────────────────────────────── */
    #location-list {
      flex: 1; overflow-y: auto;
      padding: 10px;
      display: flex; flex-direction: column; gap: 6px;
      scrollbar-width: thin;
      scrollbar-color: var(--sand-dark) transparent;
      transition: opacity .25s ease;
    }
    #location-list::-webkit-scrollbar { width: 5px; }
    #location-list::-webkit-scrollbar-thumb { background: var(--sand-dark); border-radius: 4px; }

    /* #2 — "住宿始終顯示" notice */
    .list-section-label {
      font-size: var(--text-xs); font-weight: 600;
      color: var(--dust); letter-spacing: .04em;
      text-transform: uppercase;
      padding: 6px 4px 2px;
      border-top: 1px solid var(--sand-dark);
      margin-top: 4px;
    }
    .list-section-label:first-child { border-top: none; margin-top: 0; }

    /* #6 — minor waypoints collapsible group */
    .minor-group-toggle {
      width: 100%;
      display: flex; align-items: center; gap: 8px;
      padding: 7px 10px;
      background: var(--sand); border: none;
      border-radius: 10px; cursor: pointer;
      font-family: var(--font-body); font-size: var(--text-xs);
      font-weight: 600; color: var(--dust);
      letter-spacing: .02em;
      transition: background .15s;
    }
    .minor-group-toggle:hover { background: var(--sand-dark); }
    .minor-group-toggle .toggle-arrow {
      margin-left: auto; font-size: 10px;
      transition: transform .25s;
    }
    .minor-group-toggle.open .toggle-arrow { transform: rotate(180deg); }
    #minor-list { display: none; flex-direction: column; gap: 6px; }
    #minor-list.open { display: flex; }

    /* ── Card ────────────────────────────────────────── */
    .loc-card {
      background: var(--white);
      border: 1.5px solid var(--sand-dark);
      border-radius: var(--radius-card);
      padding: 11px 12px;
      cursor: pointer;
      display: flex; align-items: flex-start; gap: 11px;
      text-align: left; width: 100%;
      font-family: var(--font-body); color: var(--dusk);
      transition: box-shadow var(--transition), border-color var(--transition), transform var(--transition);
    }
    .loc-card:hover { box-shadow: var(--shadow-card-hover); border-color: var(--clay); transform: translateY(-2px); }
    .loc-card.is-base      { background: #eef4fb; border-color: #3a5fa8; }
    .loc-card.is-highlight { background: #fff8f3; border-color: #d95f02; }
    .loc-card.is-minor     { opacity: .85; }
    .loc-card.is-minor:hover { opacity: 1; }

    .card-icon {
      width: 36px; height: 36px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; font-size: 14px; color: #fff;
      margin-top: 2px; box-shadow: 0 2px 6px rgba(0,0,0,.18);
    }
    .loc-card.is-minor .card-icon {
      width: 28px; height: 28px; font-size: 11px;
      margin-top: 5px; opacity: .85;
    }
    .card-body { flex: 1; min-width: 0; }
    .card-name {
      font-weight: 700; font-size: var(--text-base);
      line-height: var(--lh-tight); letter-spacing: var(--ls-tight);
      margin-bottom: 3px;
    }
    .loc-card.is-minor .card-name { font-weight: 500; color: var(--dust); }

    .card-meta {
      display: flex; flex-wrap: wrap; gap: 4px;
      margin-bottom: 4px; align-items: center;
    }
    .card-distance {
      display: inline-flex; align-items: center; gap: 4px;
      font-size: var(--text-xs); font-weight: 500; letter-spacing: .01em;
      padding: 2px 7px; border-radius: 999px;
      background: var(--sand); color: var(--dust);
    }
    /* #8 — event date badge */
    .card-date {
      display: inline-flex; align-items: center; gap: 3px;
      font-size: var(--text-xs); font-weight: 700;
      padding: 2px 7px; border-radius: 999px;
      background: #e8f5ee; color: #1d9960;
      letter-spacing: .01em;
    }
    .card-desc {
      font-size: var(--text-sm); font-weight: 300;
      color: var(--dust); line-height: var(--lh-loose);
    }
    .card-tag {
      display: inline-block;
      font-size: var(--text-xs); font-weight: 700;
      letter-spacing: var(--ls-wide);
      padding: 2px 7px; border-radius: 4px;
      background: #ffecd8; color: var(--clay);
      margin-bottom: 3px;
    }
    .card-tag.tag-minor {
      background: var(--sand-dark); color: var(--dust); font-weight: 500;
    }

    /* ── Map ─────────────────────────────────────────── */
    #map-wrap { flex: 1; position: relative; padding: 10px; min-width: 0; }
    #map {
      width: 100%; height: 100%;
      border-radius: var(--radius-card);
      box-shadow: var(--shadow-card);
      border: 1.5px solid var(--sand-dark);
    }

    /* #11 — Map Legend */
    #map-legend {
      position: absolute;
      bottom: 24px; right: 24px;
      z-index: 500;
      background: rgba(253,250,247,.96);
      border: 1.5px solid var(--sand-dark);
      border-radius: 12px;
      box-shadow: var(--shadow-card-hover);
      overflow: hidden;
      min-width: 148px;
      font-family: var(--font-body);
    }
    #legend-toggle {
      width: 100%;
      display: flex; align-items: center; justify-content: space-between;
      padding: 8px 12px;
      background: var(--dusk); color: var(--sand);
      border: none; cursor: pointer;
      font-family: var(--font-body); font-size: var(--text-xs); font-weight: 600;
      letter-spacing: .04em; gap: 8px;
    }
    #legend-toggle .leg-arrow { font-size: 10px; transition: transform .2s; }
    #legend-toggle.open .leg-arrow { transform: rotate(180deg); }
    #legend-body { display: none; padding: 8px 10px; }
    #legend-body.open { display: block; }
    .legend-row {
      display: flex; align-items: center; gap: 7px;
      padding: 3px 0; font-size: var(--text-xs); color: var(--dusk);
    }
    .legend-pin {
      width: 14px; height: 14px; border-radius: 50%;
      border: 2px solid #fff;
      box-shadow: 0 1px 3px rgba(0,0,0,.25);
      flex-shrink: 0;
    }

    /* ── Leaflet Popup ───────────────────────────────── */
    .leaflet-popup-content-wrapper {
      border-radius: 12px !important;
      box-shadow: var(--shadow-card-hover) !important;
      font-family: var(--font-body) !important;
      -webkit-font-smoothing: antialiased;
      border: 1.5px solid var(--sand-dark);
    }
    .leaflet-popup-content { margin: 14px 16px !important; }
    .popup-title {
      font-family: var(--font-display);
      font-weight: 700; font-size: var(--text-lg);
      line-height: var(--lh-tight); letter-spacing: var(--ls-tight);
      margin-bottom: 4px;
    }
    .popup-dist {
      font-size: var(--text-xs); font-weight: 400;
      color: var(--dust); margin-bottom: 6px;
      display: flex; align-items: center; gap: 4px;
    }
    /* #8 — popup date badge */
    .popup-date {
      display: inline-flex; align-items: center; gap: 4px;
      font-size: var(--text-xs); font-weight: 700;
      padding: 2px 8px; border-radius: 999px;
      background: #e8f5ee; color: #1d9960;
      margin-bottom: 8px;
    }
    .popup-desc {
      font-size: var(--text-sm); font-weight: 300;
      color: #555; line-height: var(--lh-loose);
      margin-bottom: 10px;
    }
    /* #9 — nav buttons stack on mobile, row on desktop */
    .popup-nav-row {
      display: flex; gap: 6px;
    }
    .popup-nav-btn {
      flex: 1;
      display: flex; align-items: center; justify-content: center; gap: 6px;
      min-height: 42px;
      padding: 8px 6px;
      border-radius: 9px; border: none;
      color: #ffffff !important;
      font-family: var(--font-body); font-size: .74rem;
      font-weight: 700; letter-spacing: .03em;
      cursor: pointer; text-decoration: none;
      transition: filter .15s, transform .1s;
      white-space: nowrap;
      -webkit-font-smoothing: antialiased;
    }
    .popup-nav-btn *,
    .popup-nav-btn i { color: #ffffff !important; }
    .popup-nav-btn:hover  { filter: brightness(1.1); transform: translateY(-1px); }
    .popup-nav-btn:active { filter: brightness(.9); transform: none; }
    .popup-nav-btn.btn-gmap  { background: #1a73e8; box-shadow: 0 2px 6px rgba(26,115,232,.35); }
    .popup-nav-btn.btn-tesla { background: #cc0000; box-shadow: 0 2px 6px rgba(204,0,0,.35); }

    /* ── Rating UI ───────────────────────────────────── */
    .popup-rating-wrap {
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid var(--sand-dark);
    }
    .popup-rating-label {
      font-size: var(--text-xs);
      font-weight: 600;
      color: var(--dust);
      margin-bottom: 6px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .popup-rating-summary {
      font-size: var(--text-xs);
      color: var(--dust);
      font-weight: 400;
    }
    .popup-stars {
      display: flex;
      gap: 4px;
      margin-bottom: 6px;
    }
    .popup-star {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 22px;
      line-height: 1;
      padding: 2px;
      color: #d0c0a8;
      transition: color .1s, transform .1s;
      -webkit-tap-highlight-color: transparent;
    }
    .popup-star:hover,
    .popup-star.hovered { color: #f5a623; transform: scale(1.15); }
    .popup-star.selected { color: #f5a623; }
    .popup-rating-status {
      font-size: var(--text-xs);
      color: var(--dust);
      min-height: 16px;
      transition: color .2s;
    }
    .popup-rating-status.sending { color: #f5a623; }
    .popup-rating-status.success { color: #1d9960; font-weight: 600; }
    .popup-rating-status.error   { color: #c0392b; }

    /* ── Marker Cluster overrides ────────────────────── */
    .marker-cluster-small,
    .marker-cluster-medium,
    .marker-cluster-large {
      background-color: rgba(44,36,32,.15) !important;
    }
    .marker-cluster-small div,
    .marker-cluster-medium div,
    .marker-cluster-large div {
      background-color: var(--dusk) !important;
      color: var(--sand) !important;
      font-family: var(--font-body) !important;
      font-weight: 700 !important;
      font-size: 12px !important;
    }

    /* ── Map Pins ────────────────────────────────────── */
    .map-pin {
      position: relative; display: flex;
      align-items: center; justify-content: center;
      color: #fff; font-size: 13px;
      transition: transform .15s, opacity .15s;
      filter: drop-shadow(0 2px 4px rgba(0,0,0,.35));
    }
    .map-pin:hover { transform: scale(1.18); filter: drop-shadow(0 3px 7px rgba(0,0,0,.45)); }

    .map-pin.shape-drop {
      width: 32px; height: 40px;
      border-radius: 50% 50% 50% 0;
      transform: rotate(-45deg);
      border: 2.5px solid #fff;
    }
    .map-pin.shape-drop i { transform: rotate(45deg); font-size: 13px; }
    .map-pin.shape-drop:hover { transform: rotate(-45deg) scale(1.18); }

    .map-pin.shape-square {
      width: 34px; height: 34px;
      border-radius: 8px; border: 2.5px solid #fff;
    }
    .map-pin.shape-star {
      width: 36px; height: 36px;
      border-radius: 50%; border: 2.5px solid #fff;
      box-shadow: 0 0 0 3px currentColor, 0 2px 8px rgba(0,0,0,.3);
    }
    .map-pin.shape-house {
      width: 34px; height: 34px;
      border-radius: 50% 50% 8px 8px; border: 2.5px solid #fff;
    }
    .map-pin.shape-diamond {
      width: 30px; height: 30px;
      border-radius: 6px; border: 2.5px solid #fff;
      transform: rotate(45deg);
    }
    .map-pin.shape-diamond i  { transform: rotate(-45deg); font-size: 12px; }
    .map-pin.shape-diamond:hover { transform: rotate(45deg) scale(1.18); }

    .map-pin.shape-circle {
      width: 32px; height: 32px;
      border-radius: 50%; border: 2.5px solid #fff;
    }
    .map-pin.shape-tag {
      width: 32px; height: 32px;
      border-radius: 50% 50% 50% 0;
      transform: rotate(45deg);
      border: 2.5px solid rgba(255,255,255,.9);
    }
    .map-pin.shape-tag i  { transform: rotate(-45deg); font-size: 12px; }
    .map-pin.shape-tag:hover { transform: rotate(45deg) scale(1.18); }

    .map-pin.is-minor {
      width: 22px; height: 22px; border-radius: 50%;
      border: 2px solid #fff; font-size: 10px;
      opacity: .78; filter: drop-shadow(0 1px 3px rgba(0,0,0,.25));
    }
    .map-pin.is-minor:hover { opacity: 1; transform: scale(1.2); }

    /* ── Empty State ─────────────────────────────────── */
    .empty-state {
      text-align: center; padding: 40px 20px;
      color: var(--dust); font-size: var(--text-sm);
    }
    .empty-state i { font-size: 2rem; margin-bottom: 10px; opacity: .4; display: block; }

    /* ── Itinerary Day Badges ────────────────────────── */
    :root {
      --day1: #e07020;   /* 橘  — Peoria → Page */
      --day2: #b83030;   /* 磚紅 — Page → 紀念碑谷 */
      --day3: #7040b0;   /* 紫  — 紀念碑谷 → Vegas */
      --day4: #2060a0;   /* 藍  — Vegas → Peoria */
    }
    .card-day {
      display: inline-flex; align-items: center; gap: 3px;
      font-size: var(--text-xs); font-weight: 700;
      padding: 2px 7px; border-radius: 999px;
      color: #fff; letter-spacing: .02em; margin-bottom: 3px;
    }
    .card-day.day-1 { background: var(--day1); }
    .card-day.day-2 { background: var(--day2); }
    .card-day.day-3 { background: var(--day3); }
    .card-day.day-4 { background: var(--day4); }

    /* popup day badge */
    .popup-day {
      display: inline-flex; align-items: center; gap: 4px;
      font-size: var(--text-xs); font-weight: 700;
      padding: 2px 8px; border-radius: 999px;
      color: #fff; margin-bottom: 7px;
    }
    .popup-day.day-1 { background: var(--day1); }
    .popup-day.day-2 { background: var(--day2); }
    .popup-day.day-3 { background: var(--day3); }
    .popup-day.day-4 { background: var(--day4); }

    /* Polyline tooltip */
    .itinerary-tooltip {
      background: var(--dusk) !important;
      border: none !important;
      color: var(--sand) !important;
      font-family: var(--font-body) !important;
      font-size: var(--text-xs) !important;
      font-weight: 600 !important;
      padding: 4px 10px !important;
      border-radius: 6px !important;
      box-shadow: 0 2px 8px rgba(0,0,0,.25) !important;
    }
    .itinerary-tooltip::before { display: none !important; }

    /* Westin — 備選住宿 subtle style */
    .loc-card.is-alt-hotel { opacity: .7; border-style: dashed; }
    .loc-card.is-alt-hotel:hover { opacity: 1; }

    /* itinerary filter button — gradient when active */
    .filter-itinerary { border-color: var(--day3) !important; color: var(--day3) !important; }
    .filter-itinerary.active {
      background: linear-gradient(90deg, var(--day1), var(--day2), var(--day3)) !important;
      border-color: transparent !important;
      color: #fff !important;
    }

    /* ── Mobile ──────────────────────────────────────── */
    @media (max-width: 768px) {
      html, body { overflow: hidden; height: 100%; }
      main { flex-direction: column; overflow: hidden; height: 100%; }

      #sidebar {
        width: 100% !important; min-width: 0 !important; max-width: none;
        flex: 0 0 45vh; max-height: 45vh;
        border-right: none; border-bottom: 1px solid var(--sand-dark);
        transition: flex-basis .35s cubic-bezier(.4,0,.2,1),
                    max-height   .35s cubic-bezier(.4,0,.2,1);
        overflow: hidden;
      }
      #sidebar.collapsed {
        flex: 0 0 44px !important; max-height: 44px !important;
        min-height: 44px; box-shadow: none;
      }
      #sidebar.collapsed #filter-bar,
      #sidebar.collapsed #location-list { opacity: 0; pointer-events: none; }
      #sidebar.collapsed #sidebar-icons  { display: none; }

      #map-wrap { flex: 1 1 0; min-height: 0; height: auto; padding: 8px; }
      #map { height: 100%; width: 100%; }

      #sidebar-toggle {
        right: 50%; transform: translateX(50%);
        top: auto; bottom: -16px;
      }
      #sidebar.collapsed #sidebar-toggle { transform: translateX(50%) rotate(180deg); }

      /* #9 — stack nav buttons vertically on narrow screens */
      .popup-nav-row { flex-direction: column; }
      .popup-nav-btn { min-height: 44px; }

      #map-legend { bottom: 16px; right: 14px; }
      .header-title h1 { font-size: 1.1rem; }
    }
    @media (max-width: 480px) {
      header { padding: 10px 14px; }
      .header-badge { display: none; }
    }
  </style>
</head>

      attraction: 'shape-drop',  art: 'shape-diamond',

    const GH_TOKEN  = _a + _b;

    /* ── Map ─────────────────────────────────────────── */
    function initMap() {
      leafletMap = L.map('map', { zoomControl: true }).setView([34.5, -111.5], 7);
      L.tileLayer('https://mt1.google.com/vt/lyrs=m&hl=zh-TW&x={x}&y={y}&z={z}', {
        attribution: '&copy; <a href="https://maps.google.com" target="_blank" rel="noopener">Google Maps</a>',
        maxZoom: 20
      }).addTo(leafletMap);

      // #1 — MarkerCluster group
      clusterGroup = L.markerClusterGroup({
        disableClusteringAtZoom: 10,
        maxClusterRadius: 50,
        spiderfyOnMaxZoom: true,
        showCoverageOnHover: false,
        zoomToBoundsOnClick: true
      });
      leafletMap.addLayer(clusterGroup);

      LOCATIONS.forEach(addMarker);
      fitAllVisible();
      buildLegend();        // #11
      updateFilterBadges(); // #2

    function makeIcon(loc) {
      if (loc.isMinor) {
        const color = CAT_COLOR[loc.category] || '#888';
        return L.divIcon({
          className: '',
          html: `<div class="map-pin is-minor" style="background:${color}" aria-hidden="true">
                   <i class="fa-solid ${loc.icon}"></i></div>`,
          iconSize: [22,22], iconAnchor: [11,11], popupAnchor: [0,-13]
        });
      }
      const color = CAT_COLOR[loc.category] || '#666';
      const shape = CAT_SHAPE[loc.category] || 'shape-circle';
      const isRotated = ['shape-drop','shape-diamond','shape-tag'].includes(shape);
      const size = isRotated ? 42 : 38;
      const anc  = size / 2;
      const popY = shape === 'shape-drop' ? -22 : -20;
      return L.divIcon({
        className: '',
        html: `<div class="map-pin ${shape}" style="background:${color};color:${color}" aria-hidden="true">
                 <i class="fa-solid ${loc.icon}" style="color:#fff"></i></div>`,
        iconSize: [size,size], iconAnchor: [anc,anc], popupAnchor: [0,popY]
      });
    }

    /* ── Rating Helpers (宣告在 addMarker 之前) ─────── */
    function renderRatingSummary(id) {
      const scores = ratingsData[id];
      if (!scores || !scores.length) return '尚無評分';
      const avg  = (scores.reduce((a, b) => a + b, 0) / scores.length).toFixed(1);
      const full = Math.round(+avg);
      return '★'.repeat(full) + '☆'.repeat(5 - full) + ` ${avg}（${scores.length} 人）`;
    }

    async function submitRating(locId, score, starEls) {
      const statusEl = document.getElementById(`rating-status-${locId}`);
      const sumEl    = document.getElementById(`rating-summary-${locId}`);
      starEls.forEach((s, i) => { s.classList.toggle('selected', i < score); s.disabled = true; });
      if (statusEl) { statusEl.textContent = '傳送中…'; statusEl.className = 'popup-rating-status sending'; }
      try {
        const res = await fetch(`https://api.github.com/repos/${GH_OWNER}/${GH_REPO}/issues`, {
          method: 'POST',
          headers: {
            'Authorization':        `Bearer ${GH_TOKEN}`,
            'Content-Type':         'application/json',
            'Accept':               'application/vnd.github+json',
            'X-GitHub-Api-Version': '2022-11-28'
          },
          body: JSON.stringify({
            title: `rating:${locId}:${score}`,
            body:  `{"id":"${locId}","score":${score}}`,
            labels: ['rating']
          })
        });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        if (!ratingsData[locId]) ratingsData[locId] = [];
        ratingsData[locId].push(score);
        if (sumEl)    sumEl.textContent = renderRatingSummary(locId);
        if (statusEl) { statusEl.textContent = '✓ 已送出！'; statusEl.className = 'popup-rating-status success'; }
      } catch {
        if (statusEl) { statusEl.textContent = '傳送失敗，請稍後再試。'; statusEl.className = 'popup-rating-status error'; }
        starEls.forEach(s => { s.disabled = false; s.classList.remove('selected'); });
      }
    }

    function addMarker(loc) {
      const color     = CAT_COLOR[loc.category] || '#666';
      const gmapUrl   = `https://www.google.com/maps/dir/?api=1&destination=${loc.lat},${loc.lng}&travelmode=driving`;
      const teslaUrl  = `https://nav.tesla.com/tesla/ownership/navigation?lat=${loc.lat}&lon=${loc.lng}&name=${encodeURIComponent(loc.name)}`;
      const dateBadge = loc.eventDate
        ? `<div class="popup-date"><i class="fa-solid fa-calendar-days" aria-hidden="true"></i>${escHtml(loc.eventDate)}</div>`
        : '';
      const dayBadge = loc.itineraryDay
        ? `<div class="popup-day day-${loc.itineraryDay}"><i class="fa-solid fa-route" aria-hidden="true"></i> Day ${loc.itineraryDay}</div>`
        : '';

      const marker = L.marker([loc.lat, loc.lng], {
        icon: makeIcon(loc), title: loc.name, alt: loc.name
      });

      marker.bindPopup(`
        <div class="popup-title" style="color:${color}">${escHtml(loc.name)}</div>
        <div class="popup-dist"><i class="fa-solid fa-car" aria-hidden="true"></i> ${escHtml(loc.timeFromBase)}</div>
        ${dayBadge}${dateBadge}
        <div class="popup-desc">${escHtml(loc.desc)}</div>
        <div class="popup-nav-row">
          <a class="popup-nav-btn btn-gmap" href="${gmapUrl}" target="_blank" rel="noopener noreferrer"
             style="color:#fff!important"
             aria-label="在 Google Maps 導航至 ${escHtml(loc.name)}">
            <i class="fa-solid fa-diamond-turn-right" style="color:#fff!important" aria-hidden="true"></i> Google Maps
          </a>
          <a class="popup-nav-btn btn-tesla" href="${teslaUrl}" target="_blank" rel="noopener noreferrer"
             style="color:#fff!important"
             aria-label="傳送至 Tesla 導航">
            <i class="fa-solid fa-car-side" style="color:#fff!important" aria-hidden="true"></i> Tesla
          </a>
        </div>
        <div class="popup-rating-wrap" id="rating-wrap-${loc.id}">
          <div class="popup-rating-label">
            <span>你的推薦指數</span>
            <span class="popup-rating-summary" id="rating-summary-${loc.id}">${renderRatingSummary(loc.id)}</span>
          </div>
          <div class="popup-stars" id="stars-${loc.id}" role="group" aria-label="評分 1 到 5 星">
            ${[1,2,3,4,5].map(n => `<button class="popup-star" data-loc="${loc.id}" data-score="${n}" aria-label="${n} 星" title="${n} 星">★</button>`).join('')}
          </div>
          <div class="popup-rating-status" id="rating-status-${loc.id}"></div>
        </div>
      `, { maxWidth: 300, minWidth: 260 });

      // Wire up star interactions — use { once: false } but track bound state to prevent accumulation
      marker.on('popupopen', () => {
        const wrap = document.getElementById(`stars-${loc.id}`);
        if (!wrap || wrap.dataset.bound) return;
        wrap.dataset.bound = '1';   // mark as bound — prevents re-binding on subsequent opens
        const stars = wrap.querySelectorAll('.popup-star');

        stars.forEach(btn => {
          btn.addEventListener('mouseenter', () => {
            const n = +btn.dataset.score;
            stars.forEach((s, i) => s.classList.toggle('hovered', i < n));
          });
          btn.addEventListener('mouseleave', () => {
            stars.forEach(s => s.classList.remove('hovered'));
          });
          btn.addEventListener('click', () => submitRating(loc.id, +btn.dataset.score, stars));
        });

        // Refresh summary with latest ratingsData
        const sumEl = document.getElementById(`rating-summary-${loc.id}`);
        if (sumEl) sumEl.textContent = renderRatingSummary(loc.id);
      });

      marker.on('click', () => scrollCardIntoView(loc.id));
      markersMap[loc.id] = marker;
      clusterGroup.addLayer(marker);
    }

    /* ── #11 Legend ──────────────────────────────────── */
    function buildLegend() {
      const body = document.getElementById('legend-body');
      Object.entries(CAT_COLOR).forEach(([cat, color]) => {
        const row = document.createElement('div');
        row.className = 'legend-row'; row.setAttribute('role','listitem');
        row.innerHTML = `<span class="legend-pin" style="background:${color}"></span>${CAT_LABEL[cat] || cat}`;
        body.appendChild(row);
      });
      document.getElementById('legend-toggle').addEventListener('click', () => {
        const body = document.getElementById('legend-body');
        const btn  = document.getElementById('legend-toggle');
        const open = body.classList.toggle('open');
        btn.classList.toggle('open', open);
        btn.setAttribute('aria-expanded', open);
      });
    }

    /* ── #2 Filter Badges ────────────────────────────── */
    function updateFilterBadges() {
      document.querySelectorAll('.filter-btn[data-cat]').forEach(btn => {
        const cat = btn.dataset.cat;
        // Skip itinerary — it's not a category, no meaningful count
        if (cat === 'itinerary') return;

        let existing = btn.querySelector('.filter-badge');
        const count = cat === 'all'
          ? LOCATIONS.filter(l => !l.isMinor && !l.isAltHotel).length
          : LOCATIONS.filter(l => l.category === cat && !l.isMinor && !l.isAltHotel).length;

        if (!existing) {
          existing = document.createElement('span');
          existing.className = 'filter-badge';
          btn.appendChild(existing);
        }
        existing.textContent = count;
      });
    }

    /* ── List ────────────────────────────────────────── */
    function renderList() {
      const list = document.getElementById('location-list');
      list.innerHTML = '';

      const isItinerary = currentCat === 'itinerary';

      // ── Itinerary mode: group by day ─────────────────
      if (isItinerary) {
        const dayColors = { 1:'var(--day1)', 2:'var(--day2)', 3:'var(--day3)', 4:'var(--day4)' };
        const dayNames  = { 1:'Day 1・Peoria → Page', 2:'Day 2・Page → 紀念碑谷', 3:'Day 3・紀念碑谷 → Vegas', 4:'Day 4・回程 Vegas → Peoria' };
        [1,2,3,4].forEach(day => {
          const locs = LOCATIONS.filter(l => l.itineraryDay === day);
          if (!locs.length && day !== 4) return;

          const lbl = document.createElement('li');
          lbl.className = 'list-section-label';
          lbl.style.cssText = `color:${dayColors[day]};border-top-color:${dayColors[day]};`;
          lbl.innerHTML = `<i class="fa-solid fa-route"></i> ${dayNames[day]}`;
          list.appendChild(lbl);

          if (day === 4) {
            const note = document.createElement('li');
            note.style.cssText = 'font-size:.72rem;color:var(--dust);padding:6px 10px;';
            note.textContent = '沿 US-93 → I-40 → I-17 直接回 Peoria，車程約 4 小時。';
            list.appendChild(note);
          } else {
            locs.forEach(loc => appendCard(list, loc));
          }
        });

        // Alt hotel section
        const alts = LOCATIONS.filter(l => l.isAltHotel);
        if (alts.length) {
          const lbl = document.createElement('li');
          lbl.className = 'list-section-label';
          lbl.textContent = '🏨 備選住宿';
          list.appendChild(lbl);
          alts.forEach(loc => appendCard(list, loc));
        }
        return;
      }

      // ── Normal mode ───────────────────────────────────
      const isFiltered = currentCat !== 'all';

      const primary = LOCATIONS.filter(loc =>
        !loc.isMinor && !loc.isAltHotel &&
        (currentCat === 'all' || loc.category === currentCat || loc.category === 'hotel')
      );
      const minor = LOCATIONS.filter(loc =>
        loc.isMinor && (currentCat === 'all' || loc.category === currentCat)
      );

      if (isFiltered && currentCat !== 'hotel') {
        const lbl = document.createElement('li');
        lbl.className = 'list-section-label';
        lbl.textContent = '主要景點';
        list.appendChild(lbl);
      }

      if (!primary.length) {
        const li = document.createElement('li');
        li.className = 'empty-state';
        li.innerHTML = '<i class="fa-solid fa-binoculars"></i>此分類目前沒有地點';
        list.appendChild(li);
      } else {
        primary.forEach(loc => appendCard(list, loc));
      }

      if (minor.length) {
        const lbl = document.createElement('li');
        lbl.className = 'list-section-label';
        lbl.textContent = isFiltered ? '順路中繼點' : '所有中繼點';
        list.appendChild(lbl);

        const toggleLi = document.createElement('li');
        const toggleBtn = document.createElement('button');
        toggleBtn.className = 'minor-group-toggle';
        toggleBtn.innerHTML = `<i class="fa-solid fa-circle-pause" aria-hidden="true"></i>
          順路中繼點 · ${minor.length} 個
          <i class="fa-solid fa-chevron-down toggle-arrow" aria-hidden="true"></i>`;
        toggleBtn.setAttribute('aria-expanded', 'false');
        toggleLi.appendChild(toggleBtn);
        list.appendChild(toggleLi);

        const minorUl = document.createElement('ul');
        minorUl.id = 'minor-list';
        minorUl.setAttribute('role', 'list');
        minor.forEach(loc => appendCard(minorUl, loc));
        list.appendChild(minorUl);

        toggleBtn.addEventListener('click', () => {
          const open = minorUl.classList.toggle('open');
          toggleBtn.classList.toggle('open', open);
          toggleBtn.setAttribute('aria-expanded', open);
        });
      }

      if (isFiltered && currentCat !== 'hotel') {
        const hotels = primary.filter(l => l.category === 'hotel');
        if (hotels.length) {
          const noteLi = document.createElement('li');
          noteLi.style.cssText = 'font-size:.65rem;color:var(--dust);padding:4px 6px;text-align:center;';
          noteLi.textContent = '🏨 住宿始終顯示，方便對照位置';
          list.appendChild(noteLi);
        }
      }
    }

    function appendCard(container, loc) {
      const color = CAT_COLOR[loc.category] || '#666';
      const li    = document.createElement('li');
      li.setAttribute('role', 'listitem');

      const btn = document.createElement('button');
      btn.className = ['loc-card',
        loc.isBase      ? 'is-base'      : '',
        loc.highlight   ? 'is-highlight' : '',
        loc.isMinor     ? 'is-minor'     : '',
        loc.isAltHotel  ? 'is-alt-hotel' : ''
      ].filter(Boolean).join(' ');
      btn.id = `card-${loc.id}`;
      btn.setAttribute('aria-label', `前往地圖查看：${loc.name}`);
      btn.onclick = () => focusLocation(loc.id);

      // Tag row: highlight / minor / alt-hotel
      const tagHtml = loc.highlight
        ? '<span class="card-tag">⭐ 本次亮點</span>'
        : loc.isMinor
          ? '<span class="card-tag tag-minor"><i class="fa-solid fa-circle-pause"></i> 順路中繼點</span>'
          : loc.isAltHotel
            ? '<span class="card-tag tag-minor">🏨 備選住宿</span>'
            : '';

      // Day badge
      const dayBadge = loc.itineraryDay
        ? `<span class="card-day day-${loc.itineraryDay}"><i class="fa-solid fa-route" aria-hidden="true"></i> Day ${loc.itineraryDay}</span>`
        : '';

      // Event date badge
      const dateBadge = loc.eventDate
        ? `<span class="card-date"><i class="fa-solid fa-calendar-days" aria-hidden="true"></i>${escHtml(loc.eventDate)}</span>`
        : '';

      btn.innerHTML = `
        <div class="card-icon" style="background:${color}" aria-hidden="true">
          <i class="fa-solid ${loc.icon}"></i>
        </div>
        <div class="card-body">
          ${tagHtml}${dayBadge}
          <div class="card-name">${escHtml(loc.name)}</div>
          <div class="card-meta">
            <span class="card-distance">
              <i class="fa-solid ${loc.isBase ? 'fa-location-dot' : 'fa-car'}" aria-hidden="true"></i>
              ${escHtml(loc.timeFromBase)}
            </span>
            ${dateBadge}
          </div>
          <p class="card-desc">${escHtml(loc.desc)}</p>
        </div>`;
      li.appendChild(btn);
      container.appendChild(li);
    }

    /* ── Itinerary Polyline ──────────────────────────── */
    const ITINERARY_DAYS = [
      { day: 1, color: '#e07020', ids: ['peoria','courtyard-page','antelope-canyon-x','horseshoe-bend'] },
      { day: 2, color: '#b83030', ids: ['horseshoe-bend','monument-valley','view-hotel'] },
      { day: 3, color: '#7040b0', ids: ['monument-valley','kingman','hoover-dam','fairfield-vegas'] },
      { day: 4, color: '#2060a0', ids: ['fairfield-vegas','peoria'] }
    ];
    const DAY_LABEL = { 1:'Day 1・Peoria → Page', 2:'Day 2・Page → 紀念碑谷', 3:'Day 3・紀念碑谷 → Vegas', 4:'Day 4・Vegas → Peoria' };
    let polylines = [];

    function showPolylines() {
      hidePolylines();
      ITINERARY_DAYS.forEach(({ day, color, ids }) => {
        const coords = ids
          .map(id => LOCATIONS.find(l => l.id === id))
          .filter(Boolean)
          .map(l => [l.lat, l.lng]);
        const pl = L.polyline(coords, {
          color, weight: 3.5, opacity: .75,
          dashArray: '8 6', lineJoin: 'round'
        }).addTo(leafletMap);
        pl.bindTooltip(DAY_LABEL[day], { sticky: true, className: 'itinerary-tooltip' });
        polylines.push(pl);
      });
    }

    function hidePolylines() {
      polylines.forEach(pl => leafletMap.removeLayer(pl));
      polylines = [];
    }

    /* ── Filter ──────────────────────────────────────── */
    function applyFilter(cat) {
      currentCat = cat;
      const isItinerary = cat === 'itinerary';

      document.querySelectorAll('[data-cat]').forEach(btn => {
        if (btn.id === 'sidebar-toggle') return;
        const active = btn.dataset.cat === cat;
        btn.classList.toggle('active', active);
        if (btn.classList.contains('filter-btn')) {
          btn.setAttribute('aria-pressed', active ? 'true' : 'false');
        }
      });

      // Show/hide polylines
      if (isItinerary) { showPolylines(); } else { hidePolylines(); }

      // Show/hide markers
      clusterGroup.clearLayers();
      LOCATIONS.forEach(loc => {
        let visible;
        if (isItinerary) {
          visible = !!loc.itineraryDay || loc.isAltHotel;
        } else {
          visible = cat === 'all' || loc.category === cat || loc.category === 'hotel';
        }
        if (visible) clusterGroup.addLayer(markersMap[loc.id]);
      });

      renderList();

      // Fit bounds
      if (isItinerary) {
        const coords = LOCATIONS.filter(l => l.itineraryDay || l.isAltHotel).map(l => [l.lat, l.lng]);
        if (coords.length) leafletMap.fitBounds(coords, { padding: [40,40], maxZoom: 12 });
      } else {
        fitAllVisible();
      }
    }

    /* ── Navigation ──────────────────────────────────── */
    function focusLocation(id) {
      const loc = LOCATIONS.find(l => l.id === id);
      if (!loc) return;
      const zoom = loc.isBase ? 12
                 : ['antelope-canyon-x','monument-valley'].includes(id) ? 11 : 13;

      const sidebar   = document.getElementById('sidebar');
      const toggleBtn = document.getElementById('sidebar-toggle');
      if (!sidebar.classList.contains('collapsed')) {
        sidebar.classList.add('collapsed');
        toggleBtn.setAttribute('aria-label', '展開側欄');
        leafletMap?.invalidateSize();
        setTimeout(() => leafletMap?.invalidateSize(), 360);
      }
      leafletMap.flyTo([loc.lat, loc.lng], zoom, { duration: 1.2 });
      setTimeout(() => markersMap[id]?.openPopup(), 1250);
      scrollCardIntoView(id);
    }

    /* ── #4 Fit All ──────────────────────────────────── */
    function fitAllVisible() {
      const coords = LOCATIONS
        .filter(loc => currentCat === 'all' || loc.category === currentCat || loc.category === 'hotel')
        .map(loc => [loc.lat, loc.lng]);
      if (coords.length) leafletMap.fitBounds(coords, { padding: [40,40], maxZoom: 12 });
    }

    function scrollCardIntoView(id) {
      document.getElementById(`card-${id}`)?.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    /* ── Utility ─────────────────────────────────────── */
    function escHtml(str) {
      return String(str)
        .replace(/&/g,'&amp;').replace(/</g,'&lt;')
        .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    /* ── Boot ────────────────────────────────────────── */
    document.addEventListener('DOMContentLoaded', () => {

      // Auto update time
      (async () => {
        try {
          const res = await fetch('version.json?_=' + Date.now());
          if (!res.ok) throw new Error();
          const { updated_utc } = await res.json();
          const d   = new Date(updated_utc);
          const cst = new Date(d.getTime() + 8 * 3600 * 1000);
          const pad = n => String(n).padStart(2,'0');
          const mo  = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][cst.getUTCMonth()];
          const lbl = `${mo} ${cst.getUTCDate()}, ${cst.getUTCFullYear()} · ${pad(cst.getUTCHours())}:${pad(cst.getUTCMinutes())} CST`;
          const el  = document.getElementById('update-time');
          el.textContent = lbl;
          el.setAttribute('datetime', updated_utc.replace('Z','+00:00'));
        } catch {
          document.getElementById('update-time')?.closest('.header-update')?.style.setProperty('display','none');
        }
      })();

      // Filter bar
      document.getElementById('filter-bar').addEventListener('click', e => {
        const btn = e.target.closest('.filter-btn');
        if (btn) applyFilter(btn.dataset.cat);
      });
      document.getElementById('sidebar-icons').addEventListener('click', e => {
        const btn = e.target.closest('.mini-icon-btn');
        if (btn) applyFilter(btn.dataset.cat);
      });

      // Sidebar toggle (#3 — re-expand on toggle)
      const sidebar   = document.getElementById('sidebar');
      const toggleBtn = document.getElementById('sidebar-toggle');
      toggleBtn.addEventListener('click', () => {
        const collapsed = sidebar.classList.toggle('collapsed');
        toggleBtn.setAttribute('aria-label', collapsed ? '展開側欄' : '收折側欄');
        leafletMap?.invalidateSize();
        setTimeout(() => leafletMap?.invalidateSize(), 360);
      });

      // #4 — fit-all button
      document.getElementById('fit-btn').addEventListener('click', fitAllVisible);

      // Geolocation
      let userMarker = null, userCircle = null;
      const locateBtn  = document.getElementById('locate-btn');
      const locateIcon = locateBtn.querySelector('i');

      function setLocateState(state) {
        locateBtn.classList.remove('locating','located','error');
        if (state === 'locating') {
          locateBtn.classList.add('locating');
          locateIcon.className = 'fa-solid fa-spinner fa-spin';
          locateBtn.setAttribute('aria-label','定位中…');
        } else if (state === 'located') {
          locateBtn.classList.add('located');
          locateIcon.className = 'fa-solid fa-location-crosshairs';
          locateBtn.setAttribute('aria-label','已定位 — 再次點擊重新定位');
        } else if (state === 'error') {
          locateBtn.classList.add('error');
          locateIcon.className = 'fa-solid fa-location-crosshairs';
          locateBtn.setAttribute('aria-label','定位失敗，點擊重試');
        } else {
          locateIcon.className = 'fa-solid fa-location-crosshairs';
          locateBtn.setAttribute('aria-label','定位我的位置');
        }
      }

      function placeUserMarker(lat, lng, accuracy) {
        if (userMarker) { leafletMap.removeLayer(userMarker); userMarker = null; }
        if (userCircle) { leafletMap.removeLayer(userCircle); userCircle = null; }
        if (accuracy && accuracy < 50000) {
          userCircle = L.circle([lat,lng], {
            radius: accuracy, color:'#4a9dc4', fillColor:'#4a9dc4',
            fillOpacity:.08, weight:1.5, dashArray:'4 4'
          }).addTo(leafletMap);
        }
        const userIcon = L.divIcon({
          className: '',
          html: `<div style="width:18px;height:18px;border-radius:50%;background:#4a9dc4;border:3px solid #fff;box-shadow:0 2px 8px rgba(0,0,0,.35);animation:pulse-ring .9s ease infinite;" aria-label="您的位置"></div>`,
          iconSize:[18,18], iconAnchor:[9,9], popupAnchor:[0,-12]
        });
        userMarker = L.marker([lat,lng], { icon: userIcon, zIndexOffset:1000 })
          .addTo(leafletMap)
          .bindPopup('<div style="font-family:var(--font-body);font-size:.82rem;font-weight:600;color:#4a9dc4">📍 您目前的位置</div>', { maxWidth:180 });
      }

      locateBtn.addEventListener('click', () => {
        if (!navigator.geolocation) { alert('此裝置不支援 GPS 定位。'); return; }
        setLocateState('locating');
        navigator.geolocation.getCurrentPosition(
          pos => {
            const { latitude:lat, longitude:lng, accuracy } = pos.coords;
            placeUserMarker(lat, lng, accuracy);
            leafletMap.flyTo([lat,lng], 12, { duration:1.2 });
            setLocateState('located');
          },
          err => {
            setLocateState('error');
            const msgs = { 1:'請在瀏覽器設定中允許位置存取權限。', 2:'無法取得位置，請確認 GPS 已開啟。', 3:'定位逾時，請重試。' };
            alert(msgs[err.code] || '定位發生未知錯誤。');
          },
          { enableHighAccuracy:true, timeout:12000, maximumAge:30000 }
        );
      });

      initMap();
      renderList();
      setTimeout(() => leafletMap?.invalidateSize(), 300);

      // Load existing ratings
      fetch('ratings.json?_=' + Date.now())
        .then(r => r.ok ? r.json() : {})
        .then(data => { ratingsData = data; })
        .catch(() => {});
    });

    window.addEventListener('resize', () => leafletMap?.invalidateSize());
  </script>
</body>
</html>
