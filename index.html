    /* ── Design Tokens ───────────────────────────────── */
    :root {
      --sand:      #f5ede0;
      --sand-dark: #e8d5bc;
      --clay:      #b85c2a;
      --clay-deep: #7a3518;
      --sky:       #4a9dc4;
      --sage:      #5a8c6e;
      --dusk:      #2c2420;
      --dust:      #8c7060;
      --white:     #fdfaf7;

      --cat-attraction: #b85c2a;
      --cat-art:        #4a9dc4;
      --cat-restaurant: #d4a019;
      --cat-coffee:     #7a6040;
      --cat-shopping:   #9b6bb5;
      --cat-events:     #c0392b;
      --cat-hotel:      #4a7fb5;

      --radius-card: 14px;
      --shadow-card: 0 2px 12px rgba(44,36,32,.10);
      --shadow-card-hover: 0 6px 24px rgba(44,36,32,.18);
      --transition: .2s ease;
      --font-body: 'Noto Sans TC', sans-serif;
      --font-display: 'Playfair Display', serif;
    }

    /* ── Reset ───────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; }
    body {
      font-family: var(--font-body);
      background: var(--sand);
      color: var(--dusk);
      display: flex;
      flex-direction: column;
    }

    /* ── Header ──────────────────────────────────────── */
    header {
      background: var(--dusk);
      color: var(--sand);
      padding: 14px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-shrink: 0;
      z-index: 100;
      border-bottom: 3px solid var(--clay);
    }
    .header-title {
      display: flex;
      align-items: baseline;
      gap: 10px;
      flex-wrap: wrap;
    }
    .header-title h1 {
      font-family: var(--font-display);
      font-size: 1.35rem;
      font-weight: 700;
      letter-spacing: -.01em;
      color: var(--white);
    }
    .header-title h1 span { color: var(--clay); font-style: italic; }
    .header-subtitle {
      font-size: .75rem;
      color: var(--dust);
      letter-spacing: .02em;
    }
    .header-badge {
      background: var(--clay);
      color: var(--white);
      font-size: .75rem;
      font-weight: 500;
      padding: 5px 13px;
      border-radius: 999px;
      white-space: nowrap;
      display: flex;
      align-items: center;
      gap: 5px;
      flex-shrink: 0;
    }

    /* ── Layout ──────────────────────────────────────── */
    main {
      flex: 1;
      display: flex;
      overflow: hidden;
      min-height: 0;
    }

    /* ── Sidebar ─────────────────────────────────────── */
    #sidebar {
      width: 380px;
      min-width: 300px;
      max-width: 420px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      background: var(--white);
      border-right: 1px solid var(--sand-dark);
      overflow: hidden;
      z-index: 50;
    }

    /* Filter bar */
    #filter-bar {
      padding: 12px 14px;
      border-bottom: 1px solid var(--sand-dark);
      display: flex;
      gap: 6px;
      overflow-x: auto;
      flex-shrink: 0;
      scrollbar-width: thin;
      scrollbar-color: var(--sand-dark) transparent;
      background: var(--sand);
    }
    #filter-bar::-webkit-scrollbar { height: 4px; }
    #filter-bar::-webkit-scrollbar-thumb { background: var(--sand-dark); border-radius: 4px; }

    .filter-btn {
      border: none;
      cursor: pointer;
      font-family: var(--font-body);
      font-size: .72rem;
      font-weight: 500;
      padding: 6px 13px;
      border-radius: 999px;
      white-space: nowrap;
      transition: background var(--transition), color var(--transition), transform .1s;
      background: var(--white);
      color: var(--dust);
      border: 1.5px solid var(--sand-dark);
    }
    .filter-btn:hover { background: var(--sand-dark); transform: translateY(-1px); }
    .filter-btn.active {
      background: var(--clay);
      color: var(--white);
      border-color: var(--clay);
    }

    /* Location list */
    #location-list {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      scrollbar-width: thin;
      scrollbar-color: var(--sand-dark) transparent;
    }
    #location-list::-webkit-scrollbar { width: 5px; }
    #location-list::-webkit-scrollbar-thumb { background: var(--sand-dark); border-radius: 4px; }

    /* Card */
    .loc-card {
      background: var(--white);
      border: 1.5px solid var(--sand-dark);
      border-radius: var(--radius-card);
      padding: 13px 14px;
      cursor: pointer;
      display: flex;
      align-items: flex-start;
      gap: 12px;
      transition: box-shadow var(--transition), border-color var(--transition), transform var(--transition);
      text-align: left;
      width: 100%;
      font-family: var(--font-body);
      color: var(--dusk);
    }
    .loc-card:hover {
      box-shadow: var(--shadow-card-hover);
      border-color: var(--clay);
      transform: translateY(-2px);
    }
    .loc-card.is-base {
      background: #eef4fb;
      border-color: var(--sky);
    }
    .loc-card.is-highlight {
      background: #fff8f3;
      border-color: var(--clay);
    }

    .card-icon {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      font-size: 15px;
      color: #fff;
      margin-top: 2px;
      box-shadow: 0 2px 6px rgba(0,0,0,.18);
    }
    .card-body { flex: 1; min-width: 0; }
    .card-name {
      font-weight: 700;
      font-size: .88rem;
      line-height: 1.3;
      margin-bottom: 4px;
    }
    .card-distance {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: .68rem;
      font-weight: 500;
      padding: 2px 8px;
      border-radius: 999px;
      background: var(--sand);
      color: var(--dust);
      margin-bottom: 5px;
    }
    .card-desc {
      font-size: .78rem;
      color: var(--dust);
      line-height: 1.55;
    }
    .card-tag {
      display: inline-block;
      font-size: .65rem;
      font-weight: 700;
      letter-spacing: .04em;
      padding: 2px 7px;
      border-radius: 4px;
      background: #ffecd8;
      color: var(--clay);
      margin-bottom: 4px;
    }

    /* ── Map ─────────────────────────────────────────── */
    #map-wrap {
      flex: 1;
      position: relative;
      padding: 10px;
      min-width: 0;
    }
    #map {
      width: 100%;
      height: 100%;
      border-radius: var(--radius-card);
      box-shadow: var(--shadow-card);
      border: 1.5px solid var(--sand-dark);
    }

    /* Leaflet popup override */
    .leaflet-popup-content-wrapper {
      border-radius: 10px !important;
      box-shadow: var(--shadow-card-hover) !important;
      font-family: var(--font-body) !important;
      border: 1.5px solid var(--sand-dark);
    }
    .leaflet-popup-content { margin: 14px 16px !important; }
    .popup-title {
      font-weight: 700;
      font-size: .92rem;
      line-height: 1.3;
      margin-bottom: 4px;
    }
    .popup-dist {
      font-size: .7rem;
      color: var(--dust);
      margin-bottom: 6px;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .popup-desc {
      font-size: .78rem;
      color: #555;
      line-height: 1.5;
    }

    /* Custom marker */
    .map-pin {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      border: 3px solid #fff;
      box-shadow: 0 2px 8px rgba(0,0,0,.28);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 14px;
      transition: transform .15s;
    }
    .map-pin:hover { transform: scale(1.15); }

    /* ── Empty state ─────────────────────────────────── */
    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: var(--dust);
      font-size: .85rem;
    }
    .empty-state i { font-size: 2rem; margin-bottom: 10px; opacity: .4; display: block; }

    /* ── Mobile layout ───────────────────────────────── */
    @media (max-width: 768px) {
      html, body { overflow: auto; }
      main { flex-direction: column; overflow: visible; }
      #sidebar {
        width: 100%;
        max-width: none;
        max-height: 50vh;
        border-right: none;
        border-bottom: 1px solid var(--sand-dark);
      }
      #map-wrap {
        height: 55vw;
        min-height: 300px;
        flex: none;
      }
      #map { height: 100%; }
      .header-title h1 { font-size: 1.1rem; }
    }

    @media (max-width: 480px) {
      header { padding: 10px 14px; }
      .header-badge { display: none; }
    }
  </style>
</head>

        icon: 'fa-wine-glass',
        highlight: false,
        desc: '現代墨西哥料理搭配無敵紅岩景觀，旅途中最美的一餐（務必提前訂位）。'
      },

      // Coffee
      {
        id: 'driftwood',
        name: 'Driftwood Coffee Co.',
        category: 'coffee',
        lat: 33.5815, lng: -112.2405,
        timeFromBase: '車程約 5 分鐘（Peoria 舊城區）',
        icon: 'fa-mug-hot',
        highlight: false,
        desc: '舊城區精品咖啡館，提供多家烘焙商手沖選項，旅途出發前的元氣補給站。'
      },
      {
        id: 'peixoto',
        name: 'Peixoto Coffee Roasters',
        category: 'coffee',
        lat: 33.3032, lng: -111.8415,
        timeFromBase: '車程約 50 分鐘（Chandler）',
        icon: 'fa-seedling',
        highlight: false,
        desc: '老闆家族在巴西自有莊園，真正的「從產地到杯子」精品咖啡體驗。'
      },

      // Shopping
      {
        id: 'outlets-anthem',
        name: 'Outlets at Anthem',
        category: 'shopping',
        lat: 33.8821, lng: -112.1328,
        timeFromBase: '車程約 30 分鐘（往北）',
        icon: 'fa-bag-shopping',
        highlight: false,
        desc: '前往塞多納或峽谷的順路必經，適合短暫停留掃貨。（注意：亞利桑那州無免稅）'
      },
      {
        id: 'premium-outlets',
        name: 'Phoenix Premium Outlets',
        category: 'shopping',
        lat: 33.2829, lng: -111.9739,
        timeFromBase: '車程約 45 分鐘（往南 Chandler）',
        icon: 'fa-tags',
        highlight: false,
        desc: '品牌齊全豐富的大型暢貨中心，喜愛購物者不容錯過。'
      },

      // Events
      {
        id: 'chase-field',
        name: '大通體育場（Chase Field）— MLB',
        category: 'events',
        lat: 33.4453, lng: -112.0667,
        timeFromBase: '車程約 35 分鐘（市區）',
        icon: 'fa-baseball',
        highlight: false,
        desc: '響尾蛇隊主場：4/17–19 對藍鳥、4/21–23 對白襪，現場看球氣氛熱烈。'
      },
      {
        id: 'charlie-puth',
        name: 'Charlie Puth 演唱會',
        category: 'events',
        lat: 33.4497, lng: -112.0811,
        timeFromBase: '車程約 35 分鐘（市區）',
        icon: 'fa-microphone',
        highlight: false,
        desc: '4/24 於 Arizona Financial Theatre 演出，流行樂迷必去。'
      },
      {
        id: 'james-taylor-la',
        name: 'James Taylor 演唱會（南加州）',
        category: 'events',
        lat: 34.1378, lng: -117.1856,
        timeFromBase: '跨州行程（加州）',
        icon: 'fa-guitar',
        highlight: false,
        desc: '傳奇音樂之夜：4/26（Yaamava\' Theater）或 4/28（聖地牙哥 Rady Shell 海濱戶外劇場）。'
      },
      {
        id: 'sphere-vegas',
        name: 'Sphere 巨型球體劇場（拉斯維加斯）',
        category: 'events',
        lat: 36.1215, lng: -115.1615,
        timeFromBase: '車程約 4 小時 40 分（內華達州）',
        icon: 'fa-globe',
        highlight: false,
        desc: 'Phish 樂團演唱會（4/18、4/23–25）或《綠野仙蹤》沉浸式電影體驗。'
      },
      {
        id: 'david-byrne',
        name: 'David Byrne 演唱會',
        category: 'events',
        lat: 36.1170, lng: -115.1760,
        timeFromBase: '跨州行程（拉斯維加斯）',
        icon: 'fa-music',
        highlight: false,
        desc: '4/20 凱薩宮 Colosseum，前衛搖滾傳奇的一夜獨場，千萬不要錯過。'
      }
    ];

    /* ── Category Config ─────────────────────────────── */
    const CAT_COLOR = {
      attraction: '#b85c2a',
      art:        '#4a9dc4',
      restaurant: '#d4a019',
      coffee:     '#7a6040',
      shopping:   '#9b6bb5',
      events:     '#c0392b',
      hotel:      '#4a7fb5'
    };

    /* ── State ───────────────────────────────────────── */
    let currentCat = 'all';
    let leafletMap = null;
    const markersMap = {};

    /* ── Map Init ────────────────────────────────────── */
    function initMap() {
      leafletMap = L.map('map', { zoomControl: true }).setView([34.5, -111.5], 7);

      L.tileLayer('https://mt1.google.com/vt/lyrs=m&hl=zh-TW&x={x}&y={y}&z={z}', {
        attribution: '&copy; <a href="https://maps.google.com" target="_blank" rel="noopener">Google Maps</a>',
        maxZoom: 20
      }).addTo(leafletMap);

      LOCATIONS.forEach(addMarker);
      fitAllVisible();
    }

    function makeIcon(color, iconClass) {
      return L.divIcon({
        className: '',
        html: `<div class="map-pin" style="background:${color}" aria-hidden="true">
                 <i class="fa-solid ${iconClass}"></i>
               </div>`,
        iconSize: [34, 34],
        iconAnchor: [17, 17],
        popupAnchor: [0, -18]
      });
    }

    function addMarker(loc) {
      const color = CAT_COLOR[loc.category] || '#666';
      const marker = L.marker([loc.lat, loc.lng], {
        icon: makeIcon(color, loc.icon),
        title: loc.name,
        alt: loc.name
      }).addTo(leafletMap);

      marker.bindPopup(`
        <div class="popup-title" style="color:${color}">${escHtml(loc.name)}</div>
        <div class="popup-dist"><i class="fa-solid fa-car" aria-hidden="true"></i> ${escHtml(loc.timeFromBase)}</div>
        <div class="popup-desc">${escHtml(loc.desc)}</div>
      `, { maxWidth: 260 });

      marker.on('click', () => scrollCardIntoView(loc.id));
      markersMap[loc.id] = marker;
    }

    /* ── List Render ─────────────────────────────────── */
    function renderList() {
      const list = document.getElementById('location-list');
      const frag = document.createDocumentFragment();

      const filtered = LOCATIONS.filter(loc =>
        currentCat === 'all' || loc.category === currentCat || loc.category === 'hotel'
      );

      if (filtered.length === 0) {
        const li = document.createElement('li');
        li.className = 'empty-state';
        li.innerHTML = '<i class="fa-solid fa-binoculars"></i>此分類目前沒有地點';
        frag.appendChild(li);
      } else {
        filtered.forEach(loc => {
          const color = CAT_COLOR[loc.category] || '#666';
          const li = document.createElement('li');
          li.setAttribute('role', 'listitem');

          const btn = document.createElement('button');
          btn.className = [
            'loc-card',
            loc.isBase   ? 'is-base'      : '',
            loc.highlight ? 'is-highlight' : ''
          ].join(' ').trim();
          btn.setAttribute('id', `card-${loc.id}`);
          btn.setAttribute('aria-label', `前往地圖查看：${loc.name}`);
          btn.setAttribute('tabindex', '0');
          btn.onclick = () => focusLocation(loc.id);

          btn.innerHTML = `
            <div class="card-icon" style="background:${color}" aria-hidden="true">
              <i class="fa-solid ${loc.icon}"></i>
            </div>
            <div class="card-body">
              ${loc.highlight ? '<span class="card-tag">⭐ 本次亮點</span>' : ''}
              <div class="card-name">${escHtml(loc.name)}</div>
              <div class="card-distance">
                <i class="fa-solid ${loc.isBase ? 'fa-location-dot' : 'fa-car'}" aria-hidden="true"></i>
                ${escHtml(loc.timeFromBase)}
              </div>
              <p class="card-desc">${escHtml(loc.desc)}</p>
            </div>
          `;

          li.appendChild(btn);
          frag.appendChild(li);
        });
      }

      list.innerHTML = '';
      list.appendChild(frag);
    }

    /* ── Filter ──────────────────────────────────────── */
    function applyFilter(cat) {
      currentCat = cat;

      // Update buttons
      document.querySelectorAll('.filter-btn').forEach(btn => {
        const active = btn.dataset.cat === cat;
        btn.classList.toggle('active', active);
        btn.setAttribute('aria-pressed', active ? 'true' : 'false');
      });

      // Show/hide markers
      LOCATIONS.forEach(loc => {
        const visible = cat === 'all' || loc.category === cat || loc.category === 'hotel';
        const marker = markersMap[loc.id];
        if (!marker) return;
        if (visible && !leafletMap.hasLayer(marker)) leafletMap.addLayer(marker);
        if (!visible && leafletMap.hasLayer(marker)) leafletMap.removeLayer(marker);
      });

      renderList();
      fitAllVisible();
    }

    /* ── Map Navigation ──────────────────────────────── */
    function focusLocation(id) {
      const loc = LOCATIONS.find(l => l.id === id);
      if (!loc) return;

      const zoom = loc.isBase ? 12
                 : ['antelope-canyon-x', 'monument-valley'].includes(id) ? 11
                 : 13;

      leafletMap.flyTo([loc.lat, loc.lng], zoom, { duration: 1.2 });
      setTimeout(() => {
        const m = markersMap[id];
        if (m) m.openPopup();
      }, 1250);

      scrollCardIntoView(id);
    }

    function fitAllVisible() {
      const coords = LOCATIONS
        .filter(loc => currentCat === 'all' || loc.category === currentCat || loc.category === 'hotel')
        .map(loc => [loc.lat, loc.lng]);
      if (coords.length > 0) {
        leafletMap.fitBounds(coords, { padding: [40, 40], maxZoom: 12 });
      }
    }

    function scrollCardIntoView(id) {
      const card = document.getElementById(`card-${id}`);
      if (card) card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    /* ── Utility ─────────────────────────────────────── */
    function escHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    /* ── Boot ────────────────────────────────────────── */
    document.addEventListener('DOMContentLoaded', () => {
      // Filter button events
      document.getElementById('filter-bar').addEventListener('click', e => {
        const btn = e.target.closest('.filter-btn');
        if (btn) applyFilter(btn.dataset.cat);
      });

      initMap();
      renderList();

      // Fix Leaflet size after layout settles
      setTimeout(() => leafletMap && leafletMap.invalidateSize(), 300);
    });

    // Handle resize (especially mobile orientation change)
    window.addEventListener('resize', () => {
      if (leafletMap) leafletMap.invalidateSize();
    });
  </script>
</body>
